# Kitty Terminal Configuration
# See https://sw.kovidgoyal.net/kitty/conf/

# Fonts
# Default font: Ubuntu Mono (system font, no Nerd Font icons)
# For Nerd Font support with icons, use one of:
#   - JetBrains Mono Nerd Font
#   - FiraCode Nerd Font  
#   - Cascadia Code Nerd Font
# Install with: ~/dotfiles/bin/install-fonts.sh

font_family      Ubuntu Mono
bold_font        Ubuntu Mono Bold
italic_font      Ubuntu Mono Italic
bold_italic_font Ubuntu Mono Bold Italic
font_size        12.0

# Adjust line height for better spacing
adjust_line_height 110%
adjust_column_width 100%

# Cursor
cursor_shape block
cursor_blink_interval 0

# Mouse
mouse_hide_wait 3.0
click_interval 0.5

# Window
remember_window_size no
initial_window_width 220c
initial_window_height 50c
window_padding_width 10
window_margin_width 0
single_window_margin_width 0
window_border_width 0

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_title_template "{title}{' (' + str(num_windows) + ' windows)' if num_windows > 1 else ''}"
active_tab_foreground   #000
active_tab_background   #eee
inactive_tab_foreground #444
inactive_tab_background #999

# Colors
# Using a dark theme similar to VS Code Dark
foreground #d4d4d4
background #1e1e1e

# Black
color0 #000000
color8 #666666

# Red
color1 #cd3131
color9 #f14c4c

# Green
color2 #0dbc79
color10 #23d18b

# Yellow
color3 #e5e510
color11 #f5f543

# Blue
color4 #2b7ec2
color12 #3b8eea

# Magenta
color5 #bc3fbc
color13 #d670d6

# Cyan
color6 #11a8cd
color14 #29b8db

# White
color7 #e5e5e5
color15 #ffffff

# Scrollback
scrollback_lines 10000
scrollback_pager less +G -R

# Selection
selection_foreground #1e1e1e
selection_background #d4d4d4

# URL
url_color #2b7ec2
url_style straight

# Keyboard shortcuts
# Note: kitty uses different key names than other terminals
# See: https://sw.kovidgoyal.net/kitty/keyboard-protocol/

# Copy/Paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# New window/tab
map ctrl+shift+n new_window
map ctrl+shift+t new_tab

# Close window/tab
map ctrl+shift+w close_window
map ctrl+shift+q close_tab

# Switch tabs
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# Font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

# Terminal
term xterm-256color
