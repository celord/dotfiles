window:
  dimensions:
    columns: 220
    lines: 50
  position:
    x: 0
    y: 0
  padding:
    x: 10
    y: 10
  opacity: 1.0

scrollback_lines: 10000

font:
  # Default font: Ubuntu Mono (installed via package manager)
  # Alternative Nerd Fonts available:
  #   - "JetBrains Mono" (for icons with Nerd Font support)
  #   - "FiraCode" (FiraCode Nerd Font)
  #   - "Cascadia Code" (Cascadia Code Nerd Font)
  # Install fonts with: ~/dotfiles/bin/install-fonts.sh
  
  normal:
    family: "Ubuntu Mono"
    style: Regular
  bold:
    family: "Ubuntu Mono"
    style: Bold
  italic:
    family: "Ubuntu Mono"
    style: Italic
  bold_italic:
    family: "Ubuntu Mono"
    style: Bold Italic
  size: 12.0

colors:
  primary:
    background: '#1e1e1e'
    foreground: '#d4d4d4'
  normal:
    black: '#000000'
    red: '#cd3131'
    green: '#0dbc79'
    yellow: '#e5e510'
    blue: '#2b7ec2'
    magenta: '#bc3fbc'
    cyan: '#11a8cd'
    white: '#e5e5e5'
  bright:
    black: '#666666'
    red: '#f14c4c'
    green: '#23d18b'
    yellow: '#f5f543'
    blue: '#3b8eea'
    magenta: '#d670d6'
    cyan: '#29b8db'
    white: '#ffffff'
  dim:
    black: '#666666'
    red: '#cd3131'
    green: '#0dbc79'
    yellow: '#e5e510'
    blue: '#2b7ec2'
    magenta: '#bc3fbc'
    cyan: '#11a8cd'
    white: '#a5a5a5'

bell:
  animation: EaseOutExpo
  duration: 0
  visual: false

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\\t"
  save_to_clipboard: true

mouse:
  double_click:
    threshold: 300
  triple_click:
    threshold: 300

hints:
  enabled: []

cursor:
  style: Block
  vi_mode_style: Beam
  thickness: 0.15

shell:
  program: /bin/zsh
  args:
    - --login

# Environment variables
env:
  TERM: xterm-256color

key_bindings:
  - { key: C, mods: Control | Shift, action: Copy }
  - { key: V, mods: Control | Shift, action: Paste }
  - { key: N, mods: Control | Shift, action: CreateNewWindow }
  - { key: W, mods: Control | Shift, action: Quit }
  - { key: Plus, mods: Control | Shift, action: IncreaseFontSize }
  - { key: Minus, mods: Control | Shift, action: DecreaseFontSize }
  - { key: 0, mods: Control | Shift, action: ResetFontSize }
  - { key: V, mods: Control | Shift, action: Paste }
  - { key: C, mods: Control | Shift, action: Copy }
  - { key: L, mods: Control | Shift, action: ClearLogNotice }
  - { key: Home, mods: Alt, action: ToggleFullscreen }
