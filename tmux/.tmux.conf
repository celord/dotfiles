# Tmux configuration file
# Set prefix to Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# General settings
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",*:RGB"
set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -g renumber-windows on

# Windows and panes
setw -g aggressive-resize on
set -g base-index 1
setw -g pane-base-index 1

# Pane splitting
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navigate panes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Windows navigation
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour235 fg=colour137'

set -g status-left '#[fg=colour233,bg=colour245] #S #[fg=colour245,bg=colour235]'
set -g status-left-length 20

set -g status-right '#[fg=colour245,bg=colour235]#[fg=colour233,bg=colour245] %Y-%m-%d #[fg=colour245,bg=colour235]#[fg=colour233,bg=colour245] %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=colour81 bg=colour238 bold'
setw -g window-status-current-format ' #I #[fg=colour250]#W#[fg=colour50]#F '

setw -g window-status-style 'fg=colour138 bg=colour235'
setw -g window-status-format ' #I #[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'

# Message
set -g message-style 'fg=colour232 bg=colour166 bold'

# Pane styles
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour51'

